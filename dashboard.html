<!DOCTYPE html>
<html>

<head>
     
    <title>Digital Locker</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="top-bar">
  <h2>🔐 Digital Locker</h2>

  <div class="user-section">
    <span id="welcomeUser"></span>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>
</div>
    <h3 id="welcomeUser"></h3>

    <div class="dashboard">

        <div class="card" onclick="openSection('resume')">
            <h2>Resume</h2>
            <p>View Uploaded Resume</p>
        </div>

        <div class="card" onclick="openSection('certificates')">
            <h2>Certificates</h2>
            <p>View Certificates</p>
        </div>

        <div class="card" onclick="openSection('documents')">
            <h2>Personal Documents</h2>
            <p>Important Documents</p>
        </div>

        <div class="card" onclick="openSection('photos')">
            <h2>Passport Photos</h2>
            <p>Photo Storage</p>
        </div>

        <div class="card" onclick="openSection('files')">
            <h2>Important Files</h2>
            <p>Other Files</p>
        </div>

        <div class="card" onclick="openSection('drive')">
            <h2>Drive Links</h2>
            <p>Google Drive Files</p>
        </div>

        

    </div>
    

    <div id="sectionPage" class="sectionPage">

        <h2 id="sectionTitle"></h2>

        <div id="documentList"></div>

        <button class="addBtn" onclick="openPopup()">+ Add New</button>

        <button class="backBtn" onclick="goBack()">Back</button>

    </div>

    <!-- Popup -->

    <div id="popup" class="popup">

        <div class="popupBox">

            <h3>Add Document</h3>

            <input id="docName" type="text" placeholder="Document Name">

            <input id="docFile" type="file">

            <input id="driveLink" type="text" placeholder="Google Drive Link">

            <button onclick="saveDoc()">Upload</button>

            <button onclick="closePopup()">Cancel</button>

        </div>

    </div>

    <script>
        if(!localStorage.getItem("token")){
            window.location="login.html";
        }
   </script>

<script src="script.js"></script>

</body>

</html>
